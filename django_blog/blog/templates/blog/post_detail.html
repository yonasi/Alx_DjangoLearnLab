{% extends 'base.html' %}
{% block content %}
  <h2>{{ post.title }}</h2>
  <p>Published: {{ post.published_date }}</p>
  <p>Author: {{ post.author }}</p>
  <p>{{ post.content }}</p>
  {% if user == post.author %}
    <a href="{% url 'post-update' post.pk %}">Edit</a>
    <a href="{% url 'post-delete' post.pk %}">Delete</a>
  {% endif %}
{% endblock %}
