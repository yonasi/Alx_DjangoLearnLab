<h1>Add Book</h1>
<form method="post">
    {% csrf_token %}
    <label for="title">Title:</label>
    <input type="text" name="title" id="title" required><br><br>
    <label for="author">Author:</label>
    <input type="text" name="author" id="author" required><br><br>
    <button type="submit">Add</button>
</form>
